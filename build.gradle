plugins {
    id 'java-library'
    id 'idea'
    id 'org.jetbrains.kotlin.jvm' version '2.0.0'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.1'
    implementation group: 'org.apache.commons', name: 'commons-lang3', version: '3.18.0'
}
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}